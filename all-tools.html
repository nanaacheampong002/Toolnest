<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Tools - ToolNest</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tools.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">ToolNest<span class="logo-dot">.</span></a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="all-tools.html" class="active">All Tools</a></li>
                <li><a href="student-tools.html">Student</a></li>
                <li><a href="pdf-tools.html">PDF</a></li>
                <li><a href="writing-tools.html">Writing</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="updates.html">Updates</a></li>
                <li><a href="help.html">Help</a></li>
            </ul>
            <div class="nav-actions">
                <div class="search-box">
                    <span class="material-icons">search</span>
                    <input type="text" id="globalSearch" placeholder="Search tools...">
                <div id="searchResults" class="search-dropdown"></div>
                </div>
                <button id="darkModeToggle" class="icon-btn">
                    <span class="material-icons">dark_mode</span>
                </button>
            </div>
            <button class="mobile-menu-btn">
                <span class="material-icons">menu</span>
            </button>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1><span class="material-icons page-icon">apps</span> All Tools</h1>
            <p>Browse our complete collection of free tools</p>
        </div>
    </div>

    <main class="all-tools-page">
        <div class="container">
            <!-- Filters -->
            <div class="tools-filter">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="student">Student</button>
                <button class="filter-btn" data-filter="pdf">PDF</button>
                <button class="filter-btn" data-filter="writing">Writing</button>
                <button class="filter-btn" data-filter="favorites">Favorites</button>
            </div>

            <!-- Tools Grid -->
            <div class="tools-grid" id="allToolsGrid"></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 ToolNest. All tools run in your browser.</p>
            <div class="footer-links">
                <a href="help.html">Help</a>
                <a href="updates.html">Updates</a>
                <a href="help.html#report-bug">Report Issue</a>
            </div>
        </div>
    </footer>

    <script src="js/storage.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Load all tools on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadAllTools();
            setupFilters();
        });

        function loadAllTools(filter = 'all') {
            const grid = document.getElementById('allToolsGrid');
            const favorites = storage.getFavorites();
            
            let toolsToShow = [...tools];
            
            if (filter === 'favorites') {
                toolsToShow = tools.filter(t => favorites.includes(t.id));
            } else if (filter !== 'all') {
                toolsToShow = tools.filter(t => t.category === filter);
            }

            grid.innerHTML = toolsToShow.map(tool => `
                <div class="tool-card" onclick="handleToolClick(${tool.id}, '${tool.url}')">
                    <span class="material-icons tool-icon">${tool.icon}</span>
                    <h3>${tool.name}</h3>
                    <p>${tool.description}</p>
                    <div class="tool-meta">
                        <span class="tool-category">${tool.category}</span>
                        <button class="favorite-btn ${favorites.includes(tool.id) ? 'active' : ''}" 
                                onclick="event.stopPropagation(); toggleFavoriteFromAll(${tool.id})">
                            <span class="material-icons">${favorites.includes(tool.id) ? 'star' : 'star_border'}</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    loadAllTools(e.target.dataset.filter);
                });
            });
        }

        function toggleFavoriteFromAll(toolId) {
            storage.toggleFavorite(toolId);
            const currentFilter = document.querySelector('.filter-btn.active').dataset.filter;
            loadAllTools(currentFilter);
        }
    </script>
</body>
</html>
